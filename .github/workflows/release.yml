name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: native
            args: ""
          - platform: windows-latest
            target: native
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri app
        shell: bash
        run: |
          set -e
          if [ -n "${{ matrix.args }}" ]; then
            ./app/node_modules/.bin/tauri build ${{ matrix.args }}
          else
            ./app/node_modules/.bin/tauri build
          fi

      - name: Show bundle directories
        shell: bash
        run: |
          find target -maxdepth 5 -type d -name bundle -print || true
          find target -maxdepth 6 -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.app.tar.gz" -o -name "*.exe" \) -print || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: localradar-${{ matrix.platform }}-${{ matrix.target }}
          if-no-files-found: error
          path: |
            target/release/bundle/**
            target/*/release/bundle/**

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: publish-tauri
    runs-on: ubuntu-22.04

    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show downloaded assets
        shell: bash
        run: |
          find release-artifacts -type f | sort

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/**/*
